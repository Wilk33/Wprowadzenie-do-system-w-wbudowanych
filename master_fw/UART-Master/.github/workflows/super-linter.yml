---
name: Lint Code Base

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_EXCLUDE: .*(Drivers|CMSIS).*
          VALIDATE_CLANG_FORMAT: false
          VALIDATE_CPP: true
          CPPLINT_ARGUMENTS: --filter=-build/include_subdir,-legal/copyright,-whitespace/line_length,-build/header_guard,-readability/casting